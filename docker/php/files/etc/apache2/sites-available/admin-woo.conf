<VirtualHost *:80>
    ServerName admin-minvws.local
    ServerAlias admin-minfin.local
    ServerAlias localhost

    Include /etc/apache2/conf-available/admin-woo-common.conf

    ErrorLog /var/log/apache2/admin_minvws_error.log
    CustomLog /var/log/apache2/admin_minvws_access.log combined
</VirtualHost>

<VirtualHost *:81>
    ServerName admin-minfin.local
    ServerAlias localhost

    Include /etc/apache2/conf-available/admin-woo-common.conf

    ErrorLog /var/log/apache2/admin_minfin_error.log
    CustomLog /var/log/apache2/admin_minfin_access.log combined
</VirtualHost>
