<VirtualHost *:443>
    ServerName publication-api-minvws.local
    ServerAlias publication-api-minvws.local
    ServerAlias localhost

    Include /etc/apache2/conf-available/publication_api-common.conf

    ErrorLog /var/log/apache2/publication_api_minvws_ssl_error.log
    CustomLog /var/log/apache2/publication_api_minvws_ssl_access.log combined
</VirtualHost>

<VirtualHost *:444>
    ServerName publication-api-minfin.local
    ServerAlias localhost

    Include /etc/apache2/conf-available/publication_api-common.conf

    ErrorLog /var/log/apache2/publication_api_minfin_ssl_error.log
    CustomLog /var/log/apache2/publication_api_minfin_ssl_access.log combined
</VirtualHost>
