<VirtualHost *:80>
    ServerName public-minvws.local
    ServerAlias public-minfin.local
    ServerAlias localhost

    Include /etc/apache2/conf-available/public-woo-common.conf

    ErrorLog /var/log/apache2/public_minvws_error.log
    CustomLog /var/log/apache2/public_minvws_access.log combined
</VirtualHost>

# This vhost is used for users that access the app using mapped ports ie localhost:8100
<VirtualHost *:81>
    ServerName public-minfin.local
    ServerAlias localhost

    Include /etc/apache2/conf-available/public-woo-common.conf

    ErrorLog /var/log/apache2/public_minfin_error.log
    CustomLog /var/log/apache2/public_minfin_access.log combined
</VirtualHost>
