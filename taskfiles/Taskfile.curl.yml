# https;?/taskfile.dev
version: "3.48.0"

tasks:

  curl:vws:*:
    desc: Make a curl request to the minVWS Publication Api
    vars:
      CLIENT: "{{index .MATCH 0}}"
    cmds:
      - curl
        --cacert ./docker/certs/generated/client-bundle.pem
        --cert ./docker/certs/generated/curl/client-{{.CLIENT}}-bundled.pem
        {{.MINVWS_PUBLICATION_API_URL}}/api/publication/v1/{{.CLI_ARGS}}
    requires:
      vars:
        - name: CLIENT
          enum: [minvws, minfin]

  curl:fin:*:
    desc: Make a curl request to the minFin Publication Api
    vars:
      CLIENT: "{{index .MATCH 0}}"
    cmds:
      - curl
        --include
        --cacert ./docker/certs/generated/client-bundle.pem
        --cert ./docker/certs/generated/curl/client-{{.CLIENT}}-bundled.pem
        {{.MINFIN_PUBLICATION_API_URL}}/api/publication/v1/{{.CLI_ARGS}}
    requires:
      vars:
        - name: CLIENT
          enum: [minvws, minfin]
