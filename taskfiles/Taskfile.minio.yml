# https://taskfile.dev
version: "3.48.0"

vars:
  MINIO_ALIAS: local
  MINIO_BUCKETS:
    - doc-bucket
    - batch-bucket
    - woo-index-bucket
    - upload-bucket
    - assets-bucket

tasks:
  minio:create-buckets:
    desc: Create the default buckets
    cmds:
      - task: dc:shell
        vars: { SUB_CMD: "admin mc ready local" }
      - for:
          matrix:
            TENANT: { ref: .TENANTS }
            BUCKET: { ref: .MINIO_BUCKETS }
        task: dc:shell
        vars: { SUB_CMD: "admin mc mb {{.MINIO_ALIAS}}/{{.ITEM.TENANT}}-{{.ITEM.BUCKET}} --ignore-existing" }
    requires:
      vars: [TENANTS, MINIO_BUCKETS]

  minio:clear-buckets:
    desc: Clear the default buckets
    cmds:
      - echo "Clearing Minio buckets... "
      - for:
          matrix:
            TENANT: { ref: .TENANTS }
            BUCKET: { ref: .MINIO_BUCKETS }
        task: dc:shell
        vars: { SUB_CMD: "admin mc rm {{.MINIO_ALIAS}}/{{.ITEM.TENANT}}-{{.ITEM.BUCKET}} --recursive --force" }
      - echo "Done clearing Minio buckets."
    requires:
      vars: [TENANTS, MINIO_BUCKETS]
