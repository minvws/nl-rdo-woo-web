# https://taskfile.dev
version: "3.48.0"

vars:
  SPECTRAL_RULE_FILE: API-Design-Rules.spectral.yml

tasks:
  lint:download-ruleset:
    desc: Download the Spectral lint ruleset
    prompt: >
      This will download and overwrite the current "./{{.SPECTRAL_RULE_FILE}}". The currently committed versio might
      contain manuall changes. Make sure to run the api lint after downloading a new version and optionally re-apply
      some or all of the manual fixes!
    cmds:
      - curl -fL
        https://logius-standaarden.github.io/API-Design-Rules/media/linter.yaml
        -o {{.SPECTRAL_RULE_FILE}}

  lint:
    desc: Lint the Publication OpenAPI specification using Spectral
    cmds:
      - task: :dc
        vars:
          SUB_CMD: run --rm spectral lint http://public-minvws.local/api/publication/v1/openapi.json {{.CLI_ARGS}}

  lint:shell:
    desc: Open a shell within the Spectral container
    cmds:
      - task: :dc
        vars:
          SUB_CMD: run --rm --entrypoint='' spectral /bin/sh
