# https://taskfile.dev
version: "3.48.0"

vars:
  ROBOT_PARAMS: --outputdir results  --name 'E2E Tests' ./tests

env:
  VIRTUAL_ENV: ""

tasks:
  dependency:upgrade:
    desc: Upgrade all RF dependencies
    cmds:
     - uv lock --upgrade

  init:
    aliases: [temp:init]
    desc: Loads E2E fixtures and create a super-admin user
    cmds:
      - task: fixtures:load:e2e
      - cmd: |
          #!/usr/bin/env bash
          set -euo pipefail

          EMAIL="email@example.org"
          CMD="docker compose run --rm admin bin/console --no-interaction --tenant=minvws"

          # Capture output safely: grep failure won't trigger exit
          CREATE_OUTPUT="$($CMD woopie:user:create "$EMAIL" "Robot Admin" --super-admin 2>&1 || true)"
          CREATE_OUTPUT_CLEAN="$(grep -v 'qrencode not found' <<< "$CREATE_OUTPUT" || true)"

          # Extract TEMP_PASSWORD and OTP_SECRET
          TEMP_PASSWORD="$(sed -n 's/^Password[[:space:]]*:[[:space:]]*\(.*\)$/\1/p' <<< "$CREATE_OUTPUT_CLEAN")"
          OTP_SECRET="$(sed -n 's/^TOTP Token[[:space:]]*:[[:space:]]*\(.*\)$/\1/p' <<< "$CREATE_OUTPUT_CLEAN")"

          if [[ -z "$TEMP_PASSWORD" || -z "$OTP_SECRET" ]]; then
              echo "ERROR: Failed to parse password or OTP secret from output:"
              echo "$CREATE_OUTPUT"
              exit 1
          fi

          mkdir -p secrets
          printf "%s" "$OTP_SECRET" > secrets/.otp_secret
          printf "%s" "$TEMP_PASSWORD" > secrets/.temp_password
          echo "User $EMAIL created successfully, secrets saved."
        silent: true
      - task: docker:run
        vars:
          tag: first-login

  local:venv:
    desc: Create virtual environment
    cmds:
      - uv venv --clear
      - uv sync
      - uv run rfbrowser init

  local:otp:
    desc: Returns an OTP code from the secret in .otp_secret
    cmds:
      - uv run python -c "import pyotp; print(pyotp.TOTP(open('secrets/.otp_secret').read().strip()).now())"

  local:run:
    aliases: [run-local]
    desc: Run Robot tests with browser on local
    dotenv:
      - .env.rf.local
    env:
      HEADLESS: false
    cmds:
      - task: :up
      - task: clear-results
      - task: disable-toolbar
      - cmd: uv run robot --include '{{.tag | default "single"}}' --exclude '{{.exclude | default ""}}' {{.ROBOT_PARAMS}}

  local:run:api:
    aliases: [run-api]
    desc: Run all API Robot tests
    dotenv:
      - .env.rf.local
    cmds:
      - task: :up
      - task: clear-results
      - task: disable-toolbar
      - cmd: uv run pabot --processes 8 --artifactsinsubfolders --include api --exclude failing {{.ROBOT_PARAMS}}

  local:run:mobile:
    desc: Run Robot tests with browser on Docker
    dotenv:
      - .env.rf.local
    env:
      HEADLESS: false
      DEVICE: iPhone 14
    cmds:
      - task: run-local
        env:
          tag: {{.tag}}

  docker:otp:
    aliases: [otp]
    desc: Returns an OTP code from the secret in .otp_secret
    cmds:
      - task: :dc
        vars: { SUB_CMD: "run --rm robot uv run python -c 'import pyotp; print(pyotp.TOTP(open(\"secrets/.otp_secret\").read().strip()).now())'" }

  docker:run:
    aliases: [run-docker]
    desc: Run Robot Framework tests in headless mode inside a docker container
    cmds:
      - task: :up
      - task: clear-results
      - task: disable-toolbar
      - task: :dc
        vars:
          SUB_CMD: >
            run --env-from-file ./tests/robot_framework/.env.rf.local --rm robot
            /bin/bash -c "uv run robot --include '{{.tag | default "single"}}' --exclude '{{.exclude | default ""}}' {{.ROBOT_PARAMS}}"

  docker:run:ci:
    aliases: [run-ci]
    desc: Run all CI Robot tests with headless browser on Docker, parallel where possible.
    env:
      HEADLESS: true
    cmds:
      - task: :up
      - task: clear-results
      - task: disable-toolbar
      - task: :dc
        vars:
          SUB_CMD: >
            run --env-from-file ./tests/robot_framework/.env.rf.local --rm robot
            /bin/bash -c "uv run pabot --processes 8 --artifactsinsubfolders --outputdir results --include ci --exclude init --exclude sitemap --ordering order.txt {{.ROBOT_PARAMS}}"

  docker:run:api:
    aliases: [run-api]
    desc: Run all API Robot tests in docker
    env:
      HEADLESS: true
    cmds:
      - task: :up
      - task: clear-results
      - task: disable-toolbar
      - task: :dc
        vars:
          SUB_CMD: >
            run --env-from-file ./tests/robot_framework/.env.rf.local --rm robot
            /bin/bash -c "uv run pabot --processes 8 --artifactsinsubfolders --outputdir results --include api --exclude failing {{.ROBOT_PARAMS}}"

  docker:shell:
    cmds:
      - task: :dc
        vars:
          SUB_CMD: "run --rm robot /bin/bash"

  test:run:
    desc: Run Robot tests with browser on TEST
    cmds:
      - task: :dc
        vars:
          SUB_CMD: >
            run --env-from-file ./tests/robot_framework/.env.rf.test --rm robot
            /bin/bash -c "uv run robot --include '{{.tag | default "testdossiers"}}' {{.ROBOT_PARAMS}}"

  acc:run:
    desc: Run Robot tests with browser on ACC
    cmds:
      - task: :dc
        vars:
          SUB_CMD: >
            run --env-from-file ./tests/robot_framework/.env.rf.acc --rm robot
            /bin/bash -c "uv run robot --include '{{.tag | default "testdossiers"}}' {{.ROBOT_PARAMS}}"

  lint:
    desc: Run Robocop linter
    cmds:
      - uv run robocop check

  format:
    desc: Run Robocop format
    cmds:
      - uv run robocop format

  cleansheet:
    desc: Run for Robot customized cleansheet
    cmds:
      - task: :dc:shell
        vars: { SUB_CMD: "admin bin/console --tenant=minvws woopie:dev:clean-sheet --index woopie-minvws --force {{.CLI_ARGS}}" }
      - task: :minio:clear-buckets

  fixtures:load:vws:
    desc: Load the VWS fixtures, used by the Covid19 theme page
    internal: true
    cmds:
      - task: :dc:shell
        vars: { SUB_CMD: "admin bin/console --tenant=minvws doctrine:fixtures:load --no-interaction --append --group=vws" }

  fixtures:load:e2e:
    desc: Load the E2E fixtures
    cmds:
      - task: :dc:shell
        vars: { SUB_CMD: "admin bin/console --tenant=minvws doctrine:fixtures:load --no-interaction --append --group=e2e" }

  clear-results:
    desc: Empties the results folder, as well as creating it if it does not exist
    internal: true
    cmds:
      - cmd: mkdir -p results
      - cmd: rm -rf results/*

  disable-toolbar:
    desc: Disable the Symfony debug toolbar in Robot Framework tests
    dir: ../../
    status:
      - test ! -f {{.BASE_PATH}}/.env.local
    cmds:
      - cmd: sed -i '' 's/^\(ENABLE_TOOLBAR=\).*$/\1false/' .env.local
        platforms: [darwin]
      - cmd: sed -i 's/^\(ENABLE_TOOLBAR=\).*$/\1false/' .env.local
        platforms: [linux]
