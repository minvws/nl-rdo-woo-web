baseline:
  skip: false
  tags: []
  request:
    body:
      departmentId: <ROBOT SELECT>
      dossierNumber: <ROBOT RANDOMIZE>
      dossierDate: <ROBOT DATE -1>
      publicationDate: <ROBOT DATE -1>
      subjectId: <ROBOT SELECT>
      summary: |
        This is a disposition document.
        It contains important decision information.
      title: <ROBOT RANDOMIZE>
      mainDocument:
        fileName: dummy.txt
        formalDate: <ROBOT DATE -1>
        grounds: [<ROBOT RANDOMIZE>]
        language: NLD
        type: c_2ab17960
      attachments:
        - externalId: <PYTHON GUID>
          fileName: attachment.txt
          formalDate: <ROBOT DATE -1>
          grounds: [<ROBOT RANDOMIZE>]
          language: NLD
          type: c_03c52ba0
    files:
      mainDocument:
        file: files/dummy.txt
        expected_response_status: 204
      attachments:
        - externalId: <PYTHON GUID>
          file: files/dummy.txt
          expected_response_status: 204
    expected_response_status: 200
    expected_publication_status: published

testcases:
- title: Happy flow
  steps:
    - name: Create disposition
      request: {}

- title: Create without attachments
  steps:
    - name: Create disposition
      request:
        body:
          attachments: []
        files:
          attachments: []

- title: Create without uploading a main document
  steps:
    - name: Create disposition
      request:
        files:
          mainDocument:
        expected_publication_status: concept

- title: Create without attachments and without uploading a main document
  steps:
    - name: Create disposition
      request:
        body:
          attachments: []
        files:
          attachments: []
          mainDocument:
        expected_publication_status: concept

- title: Upload the exact same request twice
  steps:
    - name: Create dossier
      request:
        files:
          mainDocument:
          attachments: []
          documents: []
        expected_publication_status: concept
    - name: Create dossier again with identical request
      reuse_previous_request: true
      request:
        files:
          mainDocument:
          attachments: []
        expected_publication_status: concept

- title: HAL links should be reachable
  steps:
    - name: Create dossier
      request: {}
    - name: Verify HAL links
      keyword:
        name: Verify HAL Links Are Reachable
