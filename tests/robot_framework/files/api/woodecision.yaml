    expected_publication_status: published
    reuse_previous_request: false

testcases:
- title: Happy flow
  steps:
    - name: Create dossier
      request: {}

- title: Happy flow with deep public validation
  steps:
    - name: Create dossier
      request: {}
    - name: Deeply validate dossier on public
      keyword:
        name: Deeply Validate WooDecision On Public

- title: Create a dossier without uploading a main document
  steps:
    - name: Create dossier
      request:
        files:
          mainDocument:
        expected_publication_status: concept
    - name: Check in browser
      keyword:
        name: Verify WooDecision In Admin

- title: Create a non-public dossier
  steps:
    - name: Create dossier
      request:
        body:
          decision: not_public

- title: Create a nothing-found dossier
  steps:
    - name: Create dossier
      request:
        body:
          decision: nothing_found
          attachments: []
          documents: []
        files:
          attachments: []
          documents: []
        expected_publication_status: published

- title: Create dossier with a TXT main document
  steps:
    - name: Create dossier
      request:
        files:
          mainDocument:
            file: files/dummy.txt
            expected_response_status: 204

- title: Create dossier with a PDF main document
  steps:
    - name: Create dossier
      request:
        body:
          mainDocument:
            fileName: 16115.pdf
        files:
          mainDocument:
            file: files/filetypes/16115.pdf
            expected_response_status: 204

