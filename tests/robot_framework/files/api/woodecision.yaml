testcases:
- title: Happy flow
  tags: [failing]
  steps:
    - name: Create dossier
      request: {}

- title: Create a dossier without documents
  steps:
    - name: Create dossier
      request:
        body:
          documents: []
        files:
          documents: []

- title: Create a dossier without uploading a main document
  steps:
    - name: Create dossier
      request:
        files:
          mainDocument:
        expected_publication_status: concept
    - name: Check in browser
      keyword:
        name: Verify WooDecision In Admin

- title: Create a non-public dossier
  tags: [failing]
  steps:
    - name: Create dossier
      request:
        body:
          decision: not_public

- title: Create a nothing-found dossier
  tags: [failing]
  steps:
    - name: Create dossier
      request:
        body:
          decision: nothing_found
          attachments: []
          documents: []
        files:
          attachments: []
          documents: []
        expected_publication_status: published

- title: Create a nothing-found dossier but with public documents
  tags: [failing]
  steps:
    - name: Create dossier
      request:
        body:
          decision: nothing_found
          attachments: []
        files:
          attachments: []
        expected_publication_status: published

- title: Create dossier with a TXT main document
  tags: [failing]
  steps:
    - name: Create dossier
      request:
        files:
          mainDocument: files/dummy.txt

- title: Create dossier with a PDF main document
  tags: [failing]
  steps:
    - name: Create dossier
      request:
        files:
          mainDocument: files/filetypes/16115.pdf

- title: Non-unique attachment externalIds
  steps:
    - name: Create dossier
      request:
        body:
          attachments:
            - externalId: SAME-ID-AS-OTHER-ATTACHMENT
              fileName: kranten artikel.txt
              formalDate: <ROBOT DATE -12>
              grounds: []
              internalReference: "Stond in de krant."
              language: Dutch
              type: c_c2f56984
            - externalId: SAME-ID-AS-OTHER-ATTACHMENT
              fileName: bijbehorende vergunning.txt
              formalDate: <ROBOT DATE -25>
              grounds: []
              internalReference: "Vergunning van destijds"
              language: Dutch
              type: c_002fc258
        expected_response_status: 422

- title: Attachments with zip file
  tags: [failing]
  steps:
    - name: Create dossier
      request:
        body:
          attachments:
            - externalId: <PYTHON GUID>
              fileName: relations.zip
              formalDate: <ROBOT DATE -12>
              grounds: []
              internalReference: "Stond in de krant."
              language: Dutch
              type: c_c2f56984
        files:
          attachments:
            - externalId: <PYTHON GUID>
              file: files/woodecision/relations.zip
        expected_response_status: 422

- title: Past publication
  tags: [failing]
  steps:
    - name: Create dossier
      request:
        body:
          previewDate: <ROBOT DATE -720>
          publicationDate: <ROBOT DATE -720>
        expected_publication_status: published

- title: Future publication
