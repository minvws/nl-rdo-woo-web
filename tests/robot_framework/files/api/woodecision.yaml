         documentDate: "2020-06-02"
         documentId: <ROBOT RANDOM INT>
         familyId: 333
         fileName: Dit document is meesterlijk.doc
         grounds: [<ROBOT RANDOMIZE>]
         isSuspended: false
         judgement: public
         links: []
         matter: "2025-01"
         refersTo: []
         remark: "Niets op aan te merken"
         sourceType: doc
         threadId: 12345
       - externalId: <PYTHON GUID>
         inquiryNumbers: [E2E-CASE-001, E2E-CASE-333]
         documentDate: "2020-06-03"
         documentId: <ROBOT RANDOM INT>
         familyId: 333
         fileName: leipste slides.pptx
         grounds: [<ROBOT RANDOMIZE>]
         isSuspended: false
         judgement: public
         links: []
         matter: "2025-01"
         refersTo: []
