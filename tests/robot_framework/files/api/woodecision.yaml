baseline:
  skip: false
  tags: []
  request:
    body:
      decision: public
      departmentId: <ROBOT SELECT>
      dateFrom: <ROBOT DATE -14>
      dateTo: <ROBOT DATE -7>
      dossierNumber: <ROBOT RANDOMIZE>
      previewDate: <ROBOT DATE +0>
      publicationDate: <ROBOT DATE +0>
