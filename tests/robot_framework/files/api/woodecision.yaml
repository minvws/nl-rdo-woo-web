testcases:
- title: Happy flow
  steps:
    - name: Create dossier
      request: {}

- title: Create a public dossier without documents
  tags: [failing]
  steps:
    - name: Create dossier
      request:
        body:
          documents: []
        files:
          documents: []
        expected_response_status: 422

- title: Create a partially public dossier without documents
  tags: [failing]
  steps:
    - name: Create dossier
      request:
        body:
          decision: partial_public
          documents: []
        files:
          documents: []
        expected_response_status: 422

- title: Create a dossier without uploading a main document
  steps:
    - name: Create dossier
      request:
        files:
          mainDocument:
        expected_publication_status: concept
    - name: Check in browser
      keyword:
        name: Verify WooDecision In Admin

- title: Create a non-public dossier
  steps:
    - name: Create dossier
      request:
        body:
          decision: not_public

- title: Create a nothing-found dossier
  steps:
    - name: Create dossier
      request:
        body:
          decision: nothing_found
          attachments: []
          documents: []
        files:
          attachments: []
          documents: []
        expected_publication_status: published

- title: Create a nothing-found dossier but with public documents
  tags: [failing]
  steps:
    - name: Create dossier
      request:
        body:
          decision: nothing_found
          attachments: []
        files:
          attachments: []
        expected_response_status: 422

- title: Create dossier with a TXT main document
  steps:
    - name: Create dossier
      request:
        files:
          mainDocument: files/dummy.txt

- title: Create dossier with a PDF main document
  steps:
    - name: Create dossier
      request:
        body:
          mainDocument:
            fileName: 16115.pdf
        files:
          mainDocument: files/filetypes/16115.pdf

- title: Non-unique attachment externalIds
  steps:
    - name: Create dossier
      request:
        body:
          attachments:
            - externalId: SAME-ID-AS-OTHER-ATTACHMENT
              fileName: kranten artikel.txt
              formalDate: <ROBOT DATE -12>
              grounds: []
              language: NLD
              type: c_c2f56984
            - externalId: SAME-ID-AS-OTHER-ATTACHMENT
              fileName: bijbehorende vergunning.txt
              formalDate: <ROBOT DATE -25>
              grounds: []
              language: NLD
              type: c_002fc258
        expected_response_status: 422

- title: Upload zip files # https://github.com/minvws/nl-rdo-woo-web-private/issues/6630
  tags: [failing]
  steps:
    - name: Create dossier
      request:
        body:
          mainDocument:
            fileName: relations.zip
          attachments:
            - externalId: <PYTHON GUID>
              fileName: relations.zip
              formalDate: <ROBOT DATE -12>
              grounds: []
              language: NLD
              type: c_c2f56984
          documents:
            - externalId: <PYTHON GUID>
              caseNumbers: [E2E-CASE-001]
              date: "2020-06-01"
              documentId: <ROBOT RANDOM INT>
              familyId: 333
              fileName: relations.zip
              grounds: [pietjepuk]
              isSuspended: false
              judgement: public
              links: []
              matter: "2025-01"
              refersTo: []
              remark: "Niets op aan te merken"
              sourceType: doc
              threadId: 12345
        files:
          mainDocument: files/woodecision/relations.zip
          attachments:
            - externalId: <PYTHON GUID>
              file: files/woodecision/relations.zip
          documents:
            - externalId: <PYTHON GUID>
              file: files/woodecision/relations.zip
        expected_response_status: 422

- title: Past publication
  steps:
    - name: Create dossier
      request:
        body:
          previewDate: <ROBOT DATE -720>
          publicationDate: <ROBOT DATE -720>
        expected_publication_status: published

- title: Future publication
  steps:
    - name: Create dossier
      request:
        body:
          previewDate: <ROBOT DATE +0>
          publicationDate: <ROBOT DATE +7>
        expected_publication_status: preview

- title: Preview publication
  steps:
    - name: Create dossier
      request:
        body:
          previewDate: <ROBOT DATE +7>
          publicationDate: <ROBOT DATE +14>
        expected_publication_status: scheduled

- title: Change # TODO: This might just create a new dossier instead of updating the previous one
