- title: Change document date requires re-upload
  steps:
    - name: Create dossier and upload documents
      request:
        body:
          documents:
            - externalId: <PYTHON GUID>
              inquiryNumbers: [E2E-CASE-001]
              documentDate: "2020-06-01"
              documentId: <ROBOT RANDOM INT>
              familyId: 333
              fileName: quality.doc
              grounds: [<ROBOT RANDOMIZE>]
              isSuspended: false
              judgement: public
              links: []
              matter: "2025-01"
              refersTo: []
              remark: "Niets op aan te merken"
              sourceType: doc
              threadId: 12345
        files:
          mainDocument:
          documents:
            - externalId: <PYTHON GUID>
              file: files/dummy.txt
              expected_response_status: 204
        expected_publication_status: concept
    - name: Wait until all documents are processed
      keyword:
        name: Wait For WooDecision Document Processing
        args:
          - processed
    - name: Change document date of metadata
      keyword:
        name: Change Document Date
    - name: Re-send metadata with changed document date, document needs to be re-uploaded
      reuse_previous_request: true
      request:
        body:
          documents:
            - externalId: <PYTHON GUID>
              inquiryNumbers: [E2E-CASE-001]
              documentDate: "2020-06-01"
              documentId: <ROBOT RANDOM INT>
              familyId: 333
              fileName: quality.doc
              grounds: [<ROBOT RANDOMIZE>]
              isSuspended: false
              judgement: public
              links: []
              matter: "2025-01"
              refersTo: []
              remark: "Niets op aan te merken"
              sourceType: doc
              threadId: 12345
        files:
          mainDocument:
          attachments: []
          documents: []
        expected_publication_status: concept
    - name: Verify document upload status is upload_required
      keyword:
        name: Verify WooDecision Document Processing
        args:
          - upload_required

