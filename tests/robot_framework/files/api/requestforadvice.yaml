testcases:
- title: Happy flow
  steps:
    - name: Create dossier
      request: {}

- title: Create without uploading main document
  steps:
    - name: Create dossier
      request:
        files:
          mainDocument:
        expected_publication_status: concept

- title: Create without attachments and without uploading a main document
  steps:
    - name: Create dossier
      request:
        body:
          attachments: []
        files:
          attachments: []
          mainDocument:
        expected_publication_status: concept

- title: Create with multiple advisory bodies
  steps:
    - name: Create dossier
      request:
        body:
          advisoryBodies:
            - Organisatie Die Niet Bestaat
            - Tweede Organisatie Die Niet Bestaat
            - Derde Organisatie Die Niet Bestaat
        expected_response_status: 422

- title: Create with an incorrect link
  steps:
    - name: Create dossier
      request:
        body:
          link: not-a-valid-url
        expected_response_status: 422

- title: Upload the exact same request twice
  steps:
    - name: Create dossier
      request:
        files:
          mainDocument:
          attachments: []
          documents: []
        expected_publication_status: concept
    - name: Create dossier again with identical request
      reuse_previous_request: true
      request:
        files:
          mainDocument:
          attachments: []
        expected_publication_status: concept

- title: HAL links should be reachable
  steps:
    - name: Create dossier
      request: {}
    - name: Verify HAL links
      keyword:
        name: Verify HAL Links Are Reachable
