testcases:
- title: Happy flow
  tags: [failing]
  steps:
    - name: Create dossier
      request: {}

- title: Create without attachments
  tags: [failing]
  steps:
    - name: Create dossier
      request:
        body:
          attachments: []
        files:
          attachments: []

- title: Create without uploading a main document
  tags: [failing]
  steps:
    - name: Create dossier
      request:
        files:
          mainDocument:
        expected_publication_status: concept

- title: Create without attachments and without uploading a main document
  steps:
    - name: Create dossier
      request:
        body:
          attachments: []
        files:
          attachments: []
          mainDocument:
        expected_publication_status: concept

- title: Create with year in the past
  tags: [failing]
  steps:
    - name: Create dossier
      request:
        body:
          year: <ROBOT YEAR PAST>
        expected_response_status: 422

- title: Create with year at minimum allowed
  tags: [failing]
  steps:
    - name: Create dossier
      request:
        body:
          year: <ROBOT YEAR MIN>

- title: Create with year at maximum allowed
  tags: [failing]
  steps:
    - name: Create dossier
      request:
        body:
          year: <ROBOT YEAR MAX>

- title: Create with year in the future
  tags: [failing]
  steps:
    - name: Create dossier
      request:
        body:
          year: <ROBOT YEAR FUTURE>
        expected_response_status: 422

- title: Upload the exact same request twice
  steps:
    - name: Create dossier
      request:
        files:
          mainDocument:
          attachments: []
          documents: []
        expected_publication_status: concept
    - name: Create dossier again with identical request
      reuse_previous_request: true
      request:
        files:
          mainDocument:
          attachments: []
        expected_publication_status: concept
