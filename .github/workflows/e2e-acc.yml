name: E2E Tests - Acceptance

on:
  workflow_dispatch:
    inputs:
      test_tag:
        description: Robot Framework test tag
        required: true
        type: string
        default: testdossiers

env:
  CR_PAT: ${{ secrets.GITHUB_TOKEN }}
  TEST_TAG: ${{ inputs.test_tag || 'testdossiers' }}
  GITHUB_TOKEN: ${{ secrets.REPO_READ_ONLY_TOKEN }} # For gh cli tool

jobs:
  e2e-robot-tests:
    name: Run E2E tests on Acceptance
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Setup Robot Framework test stack
        uses: ./.github/actions/setup-rf
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          robot-only: true
      - name: Create certs
        shell: bash
        run: |
          echo "${{ secrets.CLIENT_CERT_TEST }}" > certs/acc/client-minvws-combined.pem
          echo "${{ secrets.CLIENT_KEY_TEST }}" > certs/acc/client-minvws.key
      - name: Create .env.rf.acc
        shell: bash
        run: |
          cat > tests/robot_framework/.env.rf.acc << 'EOF'
          ENVIRONMENT=acc
          HEADLESS=true
          URL_PUBLIC=${{ secrets.URL_PUBLIC_STAGING }}
          URL_ADMIN=${{ secrets.URL_ADMIN_STAGING }}
          HTACCESS_USERNAME=${{ secrets.USERNAME_WOO_STAGING }}
          HTACCESS_PASSWORD=${{ secrets.PASSWORD_WOO_STAGING }}
          ADMIN_EMAIL=${{ secrets.EMAIL_WOO_STAGING_BALIE }}
          ADMIN_PASSWORD=${{ secrets.PASSWORD_WOO_STAGING_BALIE }}
          ADMIN_SECRET=${{ secrets.SECRET_WOO_STAGING_BALIE }}
          URL_API=${{ secrets.URL_API_STAGING }}
          CLIENT_CERT=./certs/acc/client-minvws-combined.pem
          CLIENT_KEY=./certs/acc/client-minvws.key
          EOF
      - name: Run Robot Framework tests
        run: task rf:acc:run tag=${{ inputs.test_tag || 'ci' }}
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: reports
          path: tests/robot_framework/results
      - name: Publish test results
        uses: minvws/action-robotframework-summary@v1.0.0
        if: ${{ always() }}
        with:
          output_file: tests/robot_framework/results/output.xml
          endpoints: ${{ secrets.URL_PUBLIC_STAGING }}
          username: ${{ secrets.USERNAME_WOO_STAGING }}
          password: ${{ secrets.PASSWORD_WOO_STAGING }}
